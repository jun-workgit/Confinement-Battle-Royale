<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>禁闭逃杀 — 管理员视图</title>
<link rel="icon" type="image/png" href="/assets/player-dead.png">
<link rel="stylesheet" href="/shared.css">
</head>
<body>
<div class="page">
  <div class="panel" id="panel">
    <div class="center-msg"><span class="big">加载中...</span></div>
  </div>
</div>

<script src="/map-data.js"></script>
<script src="/roles-data.js"></script>
<script src="/ws-client.js"></script>
<script src="/auth.js"></script>
<script>
const panel = document.getElementById("panel");
// Temporarily hidden — flip back to true to restore the import button.
// The underlying feature (importPlayersFromSheet, /api/import-players) is
// untouched, so re-enabling is just this one flag.
const SHOW_IMPORT_FEATURE = false;
const PW_KEY = "jbts_admin_pw";
let adminPassword = sessionStorage.getItem(PW_KEY);
let latestState = null;
let socket = null;

// One global edit mode covers every editable field (per-player stats/health,
// round, poison floors) so admin edits commit together in a single broadcast
// instead of field-by-field.
let isEditing = false;
let draft = null;
let adminTab = "players";

// Settlement (结算阶段) — purely local UI state; the actual draft lives
// server-side (state.settlementDraft) so "取消结算" can exit this view
// without losing any already-committed section (re-entering resumes it).
let inSettlement = false;
let expandedSettlementSection = "surgery";
const SETTLEMENT_SECTIONS = [
  { key: "surgery", title: "1. 手术室是否进行手术" },
  { key: "combat", title: "2. 哪些房间发生战斗、乱斗或暗影与人相遇事件" },
  { key: "poison", title: "3. 哪个楼层成为“毒气”楼层" },
  { key: "hunger", title: "4. 水粮上交情况" },
  { key: "rocket", title: "5. 火箭筒袭击了哪个房间" },
  { key: "items", title: "6. 道具卡使用情况" },
  { key: "revival", title: "7. 哪些暗影玩家复活" },
];

function startEdit(state) {
  isEditing = true;
  draft = {
    players: Object.fromEntries(state.players.map((p) => [p.id, { stats: { ...p.stats }, health: p.health }])),
    round: state.round,
    poisonFloors: new Set(state.poisonFloors),
  };
  render();
}

function cancelEdit() {
  isEditing = false;
  draft = null;
  render();
}

function commitEdit(state) {
  const payload = {
    type: "admin:commitEdits",
    players: Object.entries(draft.players).map(([id, v]) => ({ id: Number(id), stats: v.stats, health: v.health })),
    password: adminPassword,
  };
  if (state.phase === "in_progress") {
    payload.round = draft.round;
    payload.poisonFloors = [...draft.poisonFloors];
  }
  socket.send(payload);
  isEditing = false;
  draft = null;
}

// Pulls Strength/Speed/Capacity/End Room from the stats spreadsheet and
// applies them. Stats land in `draft` only (admin still has to click
// "确认" to commit — this button is only visible while isEditing), but
// room isn't part of the draft/commit flow in this app (it's always an
// immediate action, like the map drag-drop), so it's sent right away.
async function importPlayersFromSheet(state) {
  const btn = panel.querySelector("#import-btn");
  if (btn) { btn.disabled = true; btn.textContent = "导入中..."; }
  try {
    const res = await fetch(`/api/import-players?password=${encodeURIComponent(adminPassword)}`);
    const data = await res.json();
    if (!res.ok || !data.ok) {
      alert("导入失败：" + (data.error || "未知错误"));
      return;
    }
    let statsCount = 0, roomCount = 0;
    data.players.forEach((p) => {
      const d = draft.players[p.id];
      if (!d) return; // not a player in the current game
      if (p.strength != null) d.stats.power = Math.max(0, Math.round(p.strength));
      if (p.speed != null) d.stats.speed = Math.max(0, Math.round(p.speed));
      if (p.capacity != null) d.stats.weight = Math.max(0, Math.round(p.capacity));
      if (p.strength != null || p.speed != null || p.capacity != null) statsCount++;
      if (p.endRoom && STOPPABLE_ROOM_IDS.includes(p.endRoom)) {
        socket.send({ type: "admin:setPlayerRoom", playerId: p.id, room: p.endRoom, password: adminPassword });
        roomCount++;
      }
    });
    render();
    alert(`已导入 ${statsCount} 名玩家的属性、${roomCount} 个位置。属性仍需点击"确认"才会生效。`);
  } catch {
    alert("导入失败，请检查网络连接后重试。");
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = "导入体测数据"; }
  }
}

async function boot() {
  if (adminPassword) {
    const ok = await verifyAdminPassword(adminPassword);
    if (!ok) {
      adminPassword = null;
      sessionStorage.removeItem(PW_KEY);
    }
  }
  if (adminPassword) startApp();
  else renderLogin();
}

function renderLogin() {
  panel.innerHTML = `
    <div class="panel-header"><span class="panel-title">禁闭逃杀 · 管理员</span></div>
    <div class="panel-body" style="display:flex;justify-content:center;">
      <div class="card" style="display:flex;flex-direction:column;gap:14px;width:320px;max-width:100%;">
        <div style="font-weight:700;font-size:16px;">管理员登录</div>
        <input type="password" id="login-pw" placeholder="密码" autocomplete="off">
        <div id="login-error" class="modal-error" style="display:none;">密码错误</div>
        <button class="btn" id="login-btn">登录</button>
      </div>
    </div>`;

  const attempt = async () => {
    const pw = panel.querySelector("#login-pw").value;
    const ok = await verifyAdminPassword(pw);
    if (ok) {
      adminPassword = pw;
      sessionStorage.setItem(PW_KEY, pw);
      startApp();
    } else {
      panel.querySelector("#login-error").style.display = "block";
    }
  };
  panel.querySelector("#login-btn").addEventListener("click", attempt);
  panel.querySelector("#login-pw").addEventListener("keydown", (e) => { if (e.key === "Enter") attempt(); });
  panel.querySelector("#login-pw").focus();
}

function startApp() {
  if (socket) { render(); return; }
  socket = connectGameSocket((state) => {
    latestState = state;
    render();
  });
  startTimerTicker(() => latestState && latestState.timer);
}

// Countdown timer controls. Minute/second inputs live in the DOM between
// renders; they're only read when 设置 is clicked, and re-seeded from state on
// each render (renders only happen on broadcasts, not on local ticks).
function renderTimerTab(container, state) {
  const timer = state.timer || { durationSec: 0, remainingSec: 0, running: false, endsAt: null };
  const left = timerRemainingSec(timer);
  const mins = Math.floor(timer.durationSec / 60);
  const secs = timer.durationSec % 60;
  container.innerHTML = `
    <div class="card timer-card">
      <div style="font-weight:700;font-size:16px;">倒计时（所有视图同步显示）</div>
      <div class="timer-display" data-timer-clock>${formatTimerClock(left)}</div>
      <div class="timer-controls">
        <input type="number" id="timer-min" min="0" max="99" value="${mins}" ${timer.running ? "disabled" : ""}> 分
        <input type="number" id="timer-sec" min="0" max="59" value="${secs}" ${timer.running ? "disabled" : ""}> 秒
        <button class="btn secondary" id="timer-set-btn" ${timer.running ? "disabled" : ""}>设置</button>
      </div>
      <div class="timer-controls">
        ${timer.running
          ? `<button class="btn" id="timer-pause-btn">暂停</button>`
          : `<button class="btn" id="timer-start-btn" ${left <= 0 ? "disabled" : ""}>开始</button>`}
        <button class="btn secondary" id="timer-reset-btn" ${timer.durationSec <= 0 ? "disabled" : ""}>重置</button>
      </div>
    </div>`;
  container.querySelector("#timer-set-btn").addEventListener("click", () => {
    const m = Math.max(0, Math.min(99, Math.round(Number(container.querySelector("#timer-min").value) || 0)));
    const s = Math.max(0, Math.min(59, Math.round(Number(container.querySelector("#timer-sec").value) || 0)));
    socket.send({ type: "admin:setTimer", durationSec: m * 60 + s, password: adminPassword });
  });
  const startBtn = container.querySelector("#timer-start-btn");
  if (startBtn) startBtn.addEventListener("click", () => socket.send({ type: "admin:startTimer", password: adminPassword }));
  const pauseBtn = container.querySelector("#timer-pause-btn");
  if (pauseBtn) pauseBtn.addEventListener("click", () => socket.send({ type: "admin:pauseTimer", password: adminPassword }));
  container.querySelector("#timer-reset-btn").addEventListener("click", () => socket.send({ type: "admin:resetTimer", password: adminPassword }));
}

// Mirrors server.js's roomFloor() — only used client-side to label which
// floor a player's current room belongs to (poison section preview).
function roomFloorClient(roomId) {
  if (!roomId) return null;
  if (roomId[0] === "B") {
    const m = roomId.match(/^B(\d)/);
    return m ? "B" + m[1] : null;
  }
  if (roomId === "201" || roomId === "202") return "2";
  return "1";
}

function settlementPlayerLabel(id) {
  return `玩家 ${id}`;
}

// Shared commit/undo/reset footer for every accordion section — mirrors the
// isEditing/draft pattern's commit/cancel buttons, but scoped to one section.
function settlementFooterHtml(sec) {
  return `
    <div class="settlement-footer">
      ${sec.committed
        ? `<button class="btn secondary" data-settlement-action="undo">编辑（撤销本项提交）</button>`
        : `<button class="btn" data-settlement-action="commit">提交</button>`}
      <button class="btn secondary" data-settlement-action="reset">重置本项</button>
    </div>`;
}

function wireSettlementFooter(container, key) {
  const commitBtn = container.querySelector('[data-settlement-action="commit"]');
  if (commitBtn) {
    commitBtn.addEventListener("click", () => {
      socket.send({ type: "admin:settlementCommitSection", section: key, password: adminPassword });
    });
  }
  const undoBtn = container.querySelector('[data-settlement-action="undo"]');
  if (undoBtn) {
    undoBtn.addEventListener("click", () => {
      socket.send({ type: "admin:settlementUndoSection", section: key, password: adminPassword });
    });
  }
  const resetBtn = container.querySelector('[data-settlement-action="reset"]');
  if (resetBtn) {
    resetBtn.addEventListener("click", () => {
      if (confirm("确定要重置本项吗？将撤销已提交的更改并恢复为自动检测结果。")) {
        socket.send({ type: "admin:settlementResetSection", section: key, password: adminPassword });
      }
    });
  }
}

function settlementHealthDelta(sec, playerId) {
  return sec.committed && sec.applied ? (sec.applied.healthDeltas[playerId] || 0) : 0;
}

function renderSurgerySection(container, sec, draft) {
  const outcomeLabel = { success: "手术成功（在场每人 +4 生命）", fail: "手术失败，触发乱斗", none: "本轮无手术" }[sec.data.outcome];
  const involved = sec.data.playerIds.map((id) => draft.working.find((p) => p.id === id)).filter(Boolean);
  container.innerHTML = `
    <div style="margin-bottom:12px;font-size:14px;">检测结果：<b>${outcomeLabel}</b></div>
    ${involved.length ? `
      <div style="overflow-x:auto;"><table class="stats-table">
        <thead><tr><th>玩家</th><th>结算前</th><th>结算后</th><th>变化</th></tr></thead>
        <tbody>${involved.map((p) => {
          const delta = settlementHealthDelta(sec, p.id);
          return `<tr><td>${settlementPlayerLabel(p.id)}</td><td>${p.health - delta}</td><td>${p.health}</td><td>${delta ? `❤️${delta > 0 ? "+" : ""}${delta}` : "-"}</td></tr>`;
        }).join("")}</tbody>
      </table></div>` : `<div style="color:#8b9482;font-size:13px;">B202 手术室内存活人数不足以触发手术。</div>`}
    ${settlementFooterHtml(sec)}
  `;
  wireSettlementFooter(container, "surgery");
}

function renderCombatSection(container, sec, draft) {
  const kindLabel = { single: "单挑", multi: "乱斗", shadow: "暗影相遇" };
  const kindIcon = { single: "⚔️", multi: "⚔️", shadow: "👻" };
  container.innerHTML = `
    ${sec.data.events.length ? sec.data.events.map((ev) => {
      const players = ev.playerIds.map((id) => draft.working.find((p) => p.id === id)).filter(Boolean);
      return `
        <div class="settlement-event-group">
          <div style="font-weight:700;margin-bottom:6px;">${getRoomLabel(ev.room)} — ${kindLabel[ev.kind]}</div>
          <div style="overflow-x:auto;"><table class="stats-table">
            <thead><tr><th>玩家</th><th>武力</th><th>结算前</th><th>结算后</th><th>变化</th></tr></thead>
            <tbody>${players.map((p) => {
              const delta = settlementHealthDelta(sec, p.id);
              return `<tr><td>${settlementPlayerLabel(p.id)}${p.health <= 0 ? "（暗影）" : ""}</td><td>${p.stats.power}</td><td>${p.health - delta}</td><td>${p.health}</td><td>${delta ? `${kindIcon[ev.kind]}${delta}` : "-"}</td></tr>`;
            }).join("")}</tbody>
          </table></div>
        </div>`;
    }).join("") : `<div style="color:#8b9482;font-size:13px;">本轮没有房间发生战斗、乱斗或暗影相遇事件。</div>`}
    ${settlementFooterHtml(sec)}
  `;
  wireSettlementFooter(container, "combat");
}

function renderPoisonSection(container, sec, draft) {
  const floors = sec.data.floors;
  const affected = draft.working.filter((p) => p.health > 0 && floors.includes(roomFloorClient(p.room)));
  const tallyEntries = Object.entries(sec.data.tally);
  container.innerHTML = `
    <div style="margin-bottom:8px;font-size:14px;">投票结果：${tallyEntries.length ? tallyEntries.map(([f, c]) => `${f} 楼（${c} 票）`).join("，") : "本轮无人投票"}</div>
    <div style="margin-bottom:12px;font-size:14px;">本轮"毒气"楼层：<b>${floors.length ? floors.join("、") + " 楼" : "无"}</b></div>
    ${affected.length ? `
      <div style="overflow-x:auto;"><table class="stats-table">
        <thead><tr><th>玩家</th><th>房间</th><th>结算前</th><th>结算后</th><th>变化</th></tr></thead>
        <tbody>${affected.map((p) => {
          const delta = settlementHealthDelta(sec, p.id);
          return `<tr><td>${settlementPlayerLabel(p.id)}</td><td>${getRoomLabel(p.room)}</td><td>${p.health - delta}</td><td>${p.health}</td><td>${delta ? `☠️${delta}` : "-"}</td></tr>`;
        }).join("")}</tbody>
      </table></div>` : `<div style="color:#8b9482;font-size:13px;">没有存活玩家处于本轮"毒气"楼层。</div>`}
    ${settlementFooterHtml(sec)}
  `;
  wireSettlementFooter(container, "poison");
}

function renderHungerSection(container, sec, draft, state) {
  const entries = Object.entries(sec.data.toggles);
  container.innerHTML = `
    ${state.round < 2 ? `<div style="color:#8b9482;font-size:13px;margin-bottom:12px;">第 2 回合起才需要上交水/粮，本轮不产生影响。</div>` : ""}
    ${entries.length ? `
      <div style="overflow-x:auto;"><table class="stats-table">
        <thead><tr><th>玩家</th><th>水</th><th>粮</th><th>B204 豁免</th><th>结算前</th><th>结算后</th><th>变化</th></tr></thead>
        <tbody>${entries.map(([pid, t]) => {
          const p = draft.working.find((pp) => pp.id === Number(pid));
          if (!p) return "";
          const delta = settlementHealthDelta(sec, pid);
          const locked = sec.committed || t.exempt;
          return `<tr>
            <td>${settlementPlayerLabel(pid)}</td>
            <td><input type="checkbox" class="settlement-hunger-toggle" data-pid="${pid}" data-field="water" ${t.water ? "checked" : ""} ${locked ? "disabled" : ""}></td>
            <td><input type="checkbox" class="settlement-hunger-toggle" data-pid="${pid}" data-field="food" ${t.food ? "checked" : ""} ${locked ? "disabled" : ""}></td>
            <td>${t.exempt ? "是（餐厅）" : "-"}</td>
            <td>${p.health - delta}</td><td>${p.health}</td><td>${delta ? `🍽️${delta}` : "-"}</td>
          </tr>`;
        }).join("")}</tbody>
      </table></div>` : `<div style="color:#8b9482;font-size:13px;">没有存活玩家。</div>`}
    ${settlementFooterHtml(sec)}
  `;
  container.querySelectorAll(".settlement-hunger-toggle").forEach((cb) => {
    cb.addEventListener("change", () => {
      const pid = cb.dataset.pid;
      const field = cb.dataset.field;
      const newToggles = { ...sec.data.toggles, [pid]: { ...sec.data.toggles[pid], [field]: cb.checked } };
      socket.send({ type: "admin:settlementSetSectionData", section: "hunger", data: { toggles: newToggles }, password: adminPassword });
    });
  });
  wireSettlementFooter(container, "hunger");
}

function renderRocketSection(container, sec, draft) {
  const room = sec.data.room;
  const players = sec.data.playerIds.map((id) => draft.working.find((p) => p.id === id)).filter(Boolean);
  container.innerHTML = `
    <div style="margin-bottom:12px;font-size:14px;">本轮火箭筒目标：<b>${room ? getRoomLabel(room) : "未设置（请回到“地图”标签拖动 🚀 图标）"}</b></div>
    ${players.length ? `
      <div style="overflow-x:auto;"><table class="stats-table">
        <thead><tr><th>玩家</th><th>结算前</th><th>结算后</th><th>变化</th></tr></thead>
        <tbody>${players.map((p) => {
          const delta = settlementHealthDelta(sec, p.id);
          return `<tr><td>${settlementPlayerLabel(p.id)}</td><td>${p.health - delta}</td><td>${p.health}</td><td>${delta ? `🚀${delta}` : "-"}</td></tr>`;
        }).join("")}</tbody>
      </table></div>` : `<div style="color:#8b9482;font-size:13px;">目标房间内无玩家，或本轮未设置目标。</div>`}
    ${settlementFooterHtml(sec)}
  `;
  wireSettlementFooter(container, "rocket");
}

const SETTLEMENT_WINE_RESULTS = [
  { value: 1, label: "1：丢弃所有道具卡" },
  { value: 2, label: "2：无事发生" },
  { value: 3, label: "3：武力永久 +1" },
  { value: 4, label: "4：速度永久 +1" },
  { value: 5, label: "5：负重永久 +1" },
  { value: 6, label: "6：生命 +2" },
];

function renderItemsSection(container, sec, draft) {
  const entries = Object.entries(sec.data.toggles);
  container.innerHTML = `
    ${entries.length ? `
      <div style="overflow-x:auto;"><table class="stats-table">
        <thead><tr><th>玩家</th><th>药片</th><th>酒</th><th>酒·结果</th><th>肾上腺素</th><th>结算前</th><th>结算后</th><th>变化</th></tr></thead>
        <tbody>${entries.map(([pid, t]) => {
          const p = draft.working.find((pp) => pp.id === Number(pid));
          if (!p) return "";
          const delta = settlementHealthDelta(sec, pid);
          const variance = [];
          if (t.pill) variance.push("💊+2");
          if (t.wine && t.wineResult === 6) variance.push("🍷+2");
          if (t.wine && t.wineResult === 3) variance.push("🍷武力+1");
          if (t.wine && t.wineResult === 4) variance.push("🍷速度+1");
          if (t.wine && t.wineResult === 5) variance.push("🍷负重+1");
          if (t.wine && t.wineResult === 1) variance.push("🍷丢弃道具");
          if (t.adrenaline) variance.push("💉下轮保护");
          return `<tr>
            <td>${settlementPlayerLabel(pid)}</td>
            <td><input type="checkbox" class="settlement-item-toggle" data-pid="${pid}" data-field="pill" ${t.pill ? "checked" : ""} ${sec.committed ? "disabled" : ""}></td>
            <td><input type="checkbox" class="settlement-item-toggle" data-pid="${pid}" data-field="wine" ${t.wine ? "checked" : ""} ${sec.committed ? "disabled" : ""}></td>
            <td>${t.wine
              ? `<select class="settlement-wine-result" data-pid="${pid}" ${sec.committed ? "disabled" : ""}>
                   <option value="">选择骰子结果</option>
                   ${SETTLEMENT_WINE_RESULTS.map((w) => `<option value="${w.value}" ${t.wineResult === w.value ? "selected" : ""}>${w.label}</option>`).join("")}
                 </select>`
              : "-"}</td>
            <td><input type="checkbox" class="settlement-item-toggle" data-pid="${pid}" data-field="adrenaline" ${t.adrenaline ? "checked" : ""} ${sec.committed ? "disabled" : ""}></td>
            <td>${p.health - delta}</td><td>${p.health}</td><td>${variance.join(" ") || "-"}</td>
          </tr>`;
        }).join("")}</tbody>
      </table></div>` : `<div style="color:#8b9482;font-size:13px;">没有存活玩家。</div>`}
    ${settlementFooterHtml(sec)}
  `;
  container.querySelectorAll(".settlement-item-toggle").forEach((cb) => {
    cb.addEventListener("change", () => {
      const pid = cb.dataset.pid;
      const field = cb.dataset.field;
      const newToggles = { ...sec.data.toggles, [pid]: { ...sec.data.toggles[pid], [field]: cb.checked } };
      socket.send({ type: "admin:settlementSetSectionData", section: "items", data: { toggles: newToggles }, password: adminPassword });
    });
  });
  container.querySelectorAll(".settlement-wine-result").forEach((sel) => {
    sel.addEventListener("change", () => {
      const pid = sel.dataset.pid;
      const newToggles = { ...sec.data.toggles, [pid]: { ...sec.data.toggles[pid], wineResult: sel.value ? Number(sel.value) : null } };
      socket.send({ type: "admin:settlementSetSectionData", section: "items", data: { toggles: newToggles }, password: adminPassword });
    });
  });
  wireSettlementFooter(container, "items");
}

function renderRevivalSection(container, sec, draft) {
  const entries = Object.entries(sec.data.absorbedThisRound);
  container.innerHTML = `
    ${entries.length ? `
      <div style="overflow-x:auto;"><table class="stats-table">
        <thead><tr><th>玩家</th><th>本轮吸取</th><th>结算前</th><th>结算后</th><th>状态</th></tr></thead>
        <tbody>${entries.map(([pid, absorbed]) => {
          const p = draft.working.find((pp) => pp.id === Number(pid));
          if (!p) return "";
          const delta = settlementHealthDelta(sec, pid);
          const revived = sec.committed && sec.applied && sec.applied.revivedIds.includes(Number(pid));
          return `<tr><td>${settlementPlayerLabel(pid)}</td><td>+${absorbed}</td><td>${p.health - delta}</td><td>${p.health}</td><td>${revived ? "✅ 复活" : sec.committed ? "仍为暗影" : "-"}</td></tr>`;
        }).join("")}</tbody>
      </table></div>` : `<div style="color:#8b9482;font-size:13px;">本轮没有暗影玩家与存活玩家同处一室。</div>`}
    ${settlementFooterHtml(sec)}
  `;
  wireSettlementFooter(container, "revival");
}

function renderSettlementSectionBody(container, key, draft, state) {
  const sec = draft.sections[key];
  if (key === "surgery") renderSurgerySection(container, sec, draft);
  else if (key === "combat") renderCombatSection(container, sec, draft);
  else if (key === "poison") renderPoisonSection(container, sec, draft);
  else if (key === "hunger") renderHungerSection(container, sec, draft, state);
  else if (key === "rocket") renderRocketSection(container, sec, draft);
  else if (key === "items") renderItemsSection(container, sec, draft);
  else if (key === "revival") renderRevivalSection(container, sec, draft);
}

function renderSettlementTab(tabBody, state) {
  const draft = state.settlementDraft;
  if (!draft || draft.round !== state.round) {
    tabBody.innerHTML = `
      <div class="card" style="text-align:center;color:#8b9482;">
        点击上方"结算"按钮开始本轮结算。
      </div>`;
    return;
  }
  tabBody.innerHTML = `
    <div class="card">
      <div style="font-weight:700;font-size:16px;margin-bottom:4px;">结算阶段 · 第 ${draft.round} 回合</div>
      <div style="font-size:13px;color:#8b9482;margin-bottom:16px;">逐项提交后仅管理员可见，全部 7 项提交后点击上方"结算完成"才会一次性生效给所有玩家。</div>
      <div class="settlement-accordion">
        ${SETTLEMENT_SECTIONS.map((s) => {
          const sec = draft.sections[s.key];
          const expanded = expandedSettlementSection === s.key;
          return `
            <div class="settlement-section ${expanded ? "expanded" : ""}">
              <div class="settlement-section-header" data-section="${s.key}">
                <span>${s.title}</span>
                <span class="pill-tag ${sec.committed ? "green" : "amber"}">${sec.committed ? "已提交" : "待处理"}</span>
              </div>
              <div class="settlement-section-body" id="settlement-body-${s.key}" style="${expanded ? "" : "display:none;"}"></div>
            </div>`;
        }).join("")}
      </div>
    </div>`;

  tabBody.querySelectorAll(".settlement-section-header").forEach((header) => {
    header.addEventListener("click", () => {
      const key = header.dataset.section;
      expandedSettlementSection = expandedSettlementSection === key ? null : key;
      render();
    });
  });

  for (const s of SETTLEMENT_SECTIONS) {
    if (expandedSettlementSection !== s.key) continue;
    const bodyEl = tabBody.querySelector(`#settlement-body-${s.key}`);
    renderSettlementSectionBody(bodyEl, s.key, draft, state);
  }
}

function render() {
  const state = latestState;
  if (!state) return;
  if (state.phase === "setup") renderSetup(state);
  else if (state.phase === "ended") renderEndedAdmin(state);
  else renderDashboard(state);
}

function renderSetup(state) {
  const table = state.poisonDamageTable && state.poisonDamageTable.length ? state.poisonDamageTable : DEFAULT_POISON_DAMAGE_TABLE;
  const selectedRoles = state.selectedRoles || [];

  panel.innerHTML = `
    <div class="panel-header"><span class="panel-title">禁闭逃杀 · 管理员</span></div>
    <div class="panel-body" style="display:flex;flex-direction:row;flex-wrap:wrap;align-items:flex-start;justify-content:center;gap:24px;">
      <div class="card" style="width:420px;max-width:100%;">
        <div style="font-weight:700;font-size:16px;margin-bottom:4px;">毒气伤害设置</div>
        <div style="font-size:13px;color:#8b9482;margin-bottom:12px;">
          设置每回合"毒气"造成的生命值伤害（仅作说明展示给玩家/公共视图，不会自动扣血）。仅可在创建游戏前修改。
        </div>
        <table class="stats-table">
          <thead><tr><th>回合</th><th>生命消耗</th><th></th></tr></thead>
          <tbody id="poison-damage-tbody">
            ${table.map((row, i) => `
              <tr>
                <td>第 ${row.round} 回合</td>
                <td><input type="number" class="edit-input" min="0" data-index="${i}" value="${row.damage}"></td>
                <td><button class="btn secondary" data-remove-index="${i}" style="padding:4px 10px;font-size:12px;">×</button></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
        <button class="btn secondary" id="add-round-btn" style="margin-top:10px;font-size:12px;padding:6px 14px;">+ 添加回合</button>
      </div>
      <div class="card" style="display:flex;flex-direction:column;gap:16px;width:360px;max-width:100%;">
        <div style="font-weight:700;font-size:16px;">创建游戏</div>
        <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;color:#c9ccd1;">
          玩家人数
          <input type="number" id="player-count" min="1" max="200" value="6">
        </label>
        <button class="btn" id="create-btn">创建游戏</button>
      </div>
      <div class="card" style="width:100%;max-width:900px;">
        <label style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;margin-bottom:4px;cursor:pointer;">
          <input type="checkbox" id="roles-enabled-toggle" ${state.rolesEnabled ? "checked" : ""}>
          启用职业模式
        </label>
        <div style="font-size:13px;color:#8b9482;margin-bottom:12px;">
          启用后需选择与玩家人数相同数量的职业，游戏开始后可在"玩家属性"表格中为每位玩家指定职业。仅可在创建游戏前修改。
        </div>
        ${state.rolesEnabled ? `
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#c9ccd1;margin-bottom:12px;cursor:pointer;">
            <input type="checkbox" id="roles-visible-toggle" ${state.rolesVisibleToPlayers ? "checked" : ""}>
            向玩家展示职业信息（关闭则仅公共视图和管理员可见；玩家始终能看到自己被分配的职业）
          </label>
          <div style="font-size:13px;margin-bottom:10px;">
            已选择 <span id="role-count-label" style="color:#d8b258;font-weight:700;">${selectedRoles.length}</span> /
            <span id="role-need-label" style="color:#d8b258;font-weight:700;">6</span> 个职业（需与玩家人数一致）
          </div>
          <div class="role-select-grid">
            ${ROLES.map((r) => `
              <div class="role-select-chip ${selectedRoles.includes(r.id) ? "selected" : ""}" data-role-id="${r.id}">
                <img src="${r.image}" alt="${r.name}">
                <span>${r.name}</span>
              </div>`).join("")}
          </div>
        ` : ""}
      </div>
    </div>`;

  function sendTable(newTable) {
    socket.send({ type: "admin:setPoisonDamageTable", table: newTable, password: adminPassword });
  }

  panel.querySelectorAll("[data-index]").forEach((input) => {
    input.addEventListener("change", () => {
      const i = Number(input.dataset.index);
      const newTable = table.map((r) => ({ ...r }));
      newTable[i].damage = Math.max(0, Number(input.value) || 0);
      sendTable(newTable);
    });
  });
  panel.querySelectorAll("[data-remove-index]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const i = Number(btn.dataset.removeIndex);
      sendTable(table.filter((_, idx) => idx !== i));
    });
  });
  panel.querySelector("#add-round-btn").addEventListener("click", () => {
    const maxRound = table.reduce((m, r) => Math.max(m, r.round), 0);
    sendTable([...table.map((r) => ({ ...r })), { round: maxRound + 1, damage: 0 }]);
  });

  const playerCountInput = panel.querySelector("#player-count");
  const roleNeedLabel = panel.querySelector("#role-need-label");
  if (roleNeedLabel) roleNeedLabel.textContent = playerCountInput.value;
  playerCountInput.addEventListener("input", () => {
    if (roleNeedLabel) roleNeedLabel.textContent = playerCountInput.value;
  });

  panel.querySelector("#roles-enabled-toggle").addEventListener("change", (e) => {
    socket.send({ type: "admin:setRoleConfig", enabled: e.target.checked, roleIds: selectedRoles, visible: state.rolesVisibleToPlayers, password: adminPassword });
  });
  const rolesVisibleToggle = panel.querySelector("#roles-visible-toggle");
  if (rolesVisibleToggle) {
    rolesVisibleToggle.addEventListener("change", (e) => {
      socket.send({ type: "admin:setRoleConfig", enabled: true, roleIds: selectedRoles, visible: e.target.checked, password: adminPassword });
    });
  }
  panel.querySelectorAll(".role-select-chip").forEach((chip) => {
    chip.addEventListener("click", () => {
      const roleId = chip.dataset.roleId;
      const next = selectedRoles.includes(roleId) ? selectedRoles.filter((id) => id !== roleId) : [...selectedRoles, roleId];
      socket.send({ type: "admin:setRoleConfig", enabled: true, roleIds: next, visible: state.rolesVisibleToPlayers, password: adminPassword });
    });
  });

  panel.querySelector("#create-btn").addEventListener("click", () => {
    const n = Number(playerCountInput.value);
    if (n <= 0) return;
    if (state.rolesEnabled && selectedRoles.length !== n) {
      alert(`已启用职业模式，但已选择 ${selectedRoles.length} 个职业，需正好等于玩家人数 ${n} 个。`);
      return;
    }
    socket.send({ type: "admin:createGame", playerCount: n, password: adminPassword });
  });
}

function renderDashboard(state) {
  const isPrep = state.phase === "prep";
  const isProgress = state.phase === "in_progress";
  const roundArea = isEditing && isProgress
    ? `<span class="round-badge">第</span>
       <button class="stepper-btn sm" id="round-dec">－</button>
       <input type="number" class="edit-input" id="round-input" min="0" value="${draft.round}" style="width:52px;font-size:18px;font-weight:800;text-align:center;">
       <button class="stepper-btn sm" id="round-inc">＋</button>
       <span class="round-badge">回合</span>`
    : `<span class="round-badge">第 <span class="round-number">${state.round}</span> 回合</span>`;

  panel.innerHTML = `
    <div class="panel-header">
      <span class="panel-title">禁闭逃杀 · 管理员</span>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <span id="round-area" style="display:flex;align-items:center;gap:6px;">${roundArea}</span>
        <div class="tabs">
          <div class="tab ${adminTab === "players" ? "active" : ""}" id="admin-tab-players">玩家属性</div>
          <div class="tab ${adminTab === "map" ? "active" : ""}" id="admin-tab-map">地图</div>
          <div class="tab ${adminTab === "poison" ? "active" : ""}" id="admin-tab-poison">毒气伤害</div>
          ${isProgress ? `<div class="tab ${adminTab === "settlement" ? "active" : ""}" id="admin-tab-settlement">结算阶段</div>` : ""}
          <div class="tab ${adminTab === "ranking" ? "active" : ""}" id="admin-tab-ranking">排行榜</div>
          <div class="tab ${adminTab === "rules" ? "active" : ""}" id="admin-tab-rules">游戏规则</div>
          <div class="tab ${adminTab === "timer" ? "active" : ""}" id="admin-tab-timer">计时器</div>
        </div>
        ${inSettlement
          ? `<button class="btn" id="settlement-finish-btn" style="padding:6px 14px;font-size:12px;">结算完成</button>
             <button class="btn secondary" id="settlement-cancel-btn" style="padding:6px 14px;font-size:12px;">取消结算</button>`
          : isEditing
          ? `${SHOW_IMPORT_FEATURE ? '<button class="btn secondary" id="import-btn" style="padding:6px 14px;font-size:12px;">导入体测数据</button>' : ""}
             <button class="btn" id="commit-btn" style="padding:6px 14px;font-size:12px;">确认</button>
             <button class="btn secondary" id="cancel-btn" style="padding:6px 14px;font-size:12px;">取消</button>`
          : `<button class="btn secondary" id="edit-btn" style="padding:6px 14px;font-size:12px;">编辑</button>
             ${isProgress ? `<button class="btn secondary" id="settlement-start-btn" style="padding:6px 14px;font-size:12px;">结算</button>` : ""}`
        }
      </div>
    </div>
    <div style="padding:10px 22px 0;font-size:13px;color:#c9ccd1;">
      <span class="status-dot on"></span>${isPrep ? "准备阶段" : "游戏进行中"} · ${state.playerCount} 名玩家
    </div>
    <div class="panel-body" id="tab-body"></div>
    <div style="display:flex;justify-content:flex-end;gap:12px;padding:0 22px 22px;">
      ${isPrep ? `<button class="btn" id="start-btn" ${isEditing ? "disabled" : ""}>开始游戏</button>` : ""}
      ${isProgress ? `<button class="btn secondary" id="end-btn" ${isEditing || inSettlement ? "disabled" : ""}>结束游戏</button>` : ""}
    </div>
  `;

  panel.querySelector("#admin-tab-players").addEventListener("click", () => { adminTab = "players"; render(); });
  panel.querySelector("#admin-tab-map").addEventListener("click", () => { adminTab = "map"; render(); });
  panel.querySelector("#admin-tab-poison").addEventListener("click", () => { adminTab = "poison"; render(); });
  const settlementTabBtn = panel.querySelector("#admin-tab-settlement");
  if (settlementTabBtn) settlementTabBtn.addEventListener("click", () => { adminTab = "settlement"; render(); });
  panel.querySelector("#admin-tab-ranking").addEventListener("click", () => { adminTab = "ranking"; render(); });
  panel.querySelector("#admin-tab-rules").addEventListener("click", () => { adminTab = "rules"; render(); });
  panel.querySelector("#admin-tab-timer").addEventListener("click", () => { adminTab = "timer"; render(); });

  const settlementStartBtn = panel.querySelector("#settlement-start-btn");
  if (settlementStartBtn) {
    settlementStartBtn.addEventListener("click", () => {
      inSettlement = true;
      adminTab = "settlement";
      expandedSettlementSection = "surgery";
      socket.send({ type: "admin:startSettlement", password: adminPassword });
      render();
    });
  }
  const settlementCancelBtn = panel.querySelector("#settlement-cancel-btn");
  if (settlementCancelBtn) {
    settlementCancelBtn.addEventListener("click", () => {
      // Client-side only — the server draft (and anything already
      // committed within it) is untouched, so re-clicking "结算" resumes.
      inSettlement = false;
      render();
    });
  }
  const settlementFinishBtn = panel.querySelector("#settlement-finish-btn");
  if (settlementFinishBtn) {
    settlementFinishBtn.addEventListener("click", () => {
      const draftState = state.settlementDraft;
      const allDone = draftState && Object.values(draftState.sections).every((s) => s.committed);
      if (!allDone) {
        alert("请先完成并提交全部 7 个结算项目，才能结束本轮结算。");
        return;
      }
      socket.send({ type: "admin:finishSettlement", password: adminPassword });
      inSettlement = false;
      adminTab = "players";
      render();
    });
  }

  if (isEditing && isProgress) {
    panel.querySelector("#round-input").addEventListener("input", (e) => {
      draft.round = Number(e.target.value) || 0;
    });
    panel.querySelector("#round-dec").addEventListener("click", () => {
      draft.round = Math.max(0, draft.round - 1);
      render();
    });
    panel.querySelector("#round-inc").addEventListener("click", () => {
      draft.round = draft.round + 1;
      render();
    });
  }

  const tabBody = panel.querySelector("#tab-body");

  if (adminTab === "players") {
    tabBody.innerHTML = `
      <div class="card">
        <div style="font-weight:700;font-size:16px;margin-bottom:12px;">玩家属性${isEditing ? "（编辑中，点击上方“确认”生效）" : "（实时）"}</div>
        <div style="overflow-x:auto;">
          <table class="stats-table">
            <thead><tr><th>玩家</th><th>生命</th><th>状态</th><th>属性状态</th><th>位置</th><th>武力</th><th>速度</th><th>负重</th>${state.rolesEnabled ? "<th>职业</th>" : ""}</tr></thead>
            <tbody id="players-tbody"></tbody>
          </table>
        </div>
      </div>`;
    renderPlayersTable(tabBody.querySelector("#players-tbody"), state);
  } else if (adminTab === "map" && isPrep) {
    tabBody.innerHTML = `
      <div class="card">
        <div style="font-weight:700;font-size:16px;margin-bottom:4px;">玩家出生点选择情况</div>
        <div style="font-size:13px;color:#8b9482;margin-bottom:12px;">玩家在准备阶段自行选择出生点，此处仅供查看</div>
        <div id="spawn-map"></div>
      </div>`;
    const spawnMapEl = tabBody.querySelector("#spawn-map");
    renderMap(spawnMapEl, [], false);
    renderMeeples(spawnMapEl.querySelector(".map-img-wrap"), state.players);
  } else if (adminTab === "map" && isProgress) {
    const hackerMark = state.hackerRoomMark && state.hackerRoomMark.round === state.round ? state.hackerRoomMark : null;
    tabBody.innerHTML = `
      <div class="card">
        <div style="font-weight:700;font-size:16px;margin-bottom:4px;">楼层中毒 / 玩家位置</div>
        <div style="font-size:13px;color:#8b9482;margin-bottom:12px;">
          ${isEditing ? "点击左侧楼层标签以激活/解除该层中毒（需点击“确认”生效）" : "点击上方“编辑”以修改中毒楼层"}
          · 拖动玩家图标到房间中标记位置（立即生效，拖回下方框内可移除）
          · 拖动玩家图标到左侧楼层标签记录本轮投毒意向（仅作标记，不影响其房间位置）
        </div>
        ${hackerMark ? `<div style="font-size:13px;color:#ff8a80;margin-bottom:12px;">黑客本轮秘密关闭：<b>${getRoomLabel(hackerMark.room)}</b>（仅黑客本人与管理员可见）</div>` : ""}
        <div class="rocket-tray">
          <div class="rocket-icon" id="rocket-drag-icon" title="拖动到房间标记本轮火箭筒袭击目标">🚀</div>
          ${state.rocketTargetRoom
            ? `<span>本轮火箭筒目标：<b>${getRoomLabel(state.rocketTargetRoom)}</b></span><button class="btn secondary" id="rocket-cancel-btn" style="padding:4px 10px;font-size:12px;">取消</button>`
            : `<span style="color:#8b9482;font-size:13px;">拖动火箭图标到房间以标记本轮火箭筒目标</span>`}
        </div>
        <div id="meeple-tray" class="meeple-tray"></div>
        <div id="poison-map"></div>
      </div>`;
    const poisonMapEl = tabBody.querySelector("#poison-map");
    const activeFloors = isEditing ? [...draft.poisonFloors] : state.poisonFloors;
    renderMap(poisonMapEl, activeFloors, isEditing);
    if (isEditing) {
      poisonMapEl.querySelectorAll(".floor-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          const floor = chip.dataset.floor;
          if (draft.poisonFloors.has(floor)) draft.poisonFloors.delete(floor);
          else draft.poisonFloors.add(floor);
          render();
        });
      });
    }
    if (hackerMark) {
      const markedEl = poisonMapEl.querySelector(`.room[data-room-id="${hackerMark.room}"]`);
      if (markedEl) markedEl.classList.add("room-hacker-marked");
    }
    if (state.rocketTargetRoom) {
      const rocketEl = poisonMapEl.querySelector(`.room[data-room-id="${state.rocketTargetRoom}"]`);
      if (rocketEl) rocketEl.classList.add("room-rocket-target");
    }
    renderFloorVoteBadges(poisonMapEl, state);
    renderMeeples(poisonMapEl.querySelector(".map-img-wrap"), state.players);
    renderMeepleTray(tabBody.querySelector("#meeple-tray"), state);
    tabBody.querySelectorAll(".meeple[data-player-id]").forEach((el) => attachMeepleDrag(el, state));
    attachRocketDrag(tabBody.querySelector("#rocket-drag-icon"));
    const rocketCancelBtn = tabBody.querySelector("#rocket-cancel-btn");
    if (rocketCancelBtn) {
      rocketCancelBtn.addEventListener("click", () => {
        socket.send({ type: "admin:setRocketTarget", room: null, password: adminPassword });
      });
    }
  } else if (adminTab === "poison") {
    const table = state.poisonDamageTable && state.poisonDamageTable.length ? state.poisonDamageTable : DEFAULT_POISON_DAMAGE_TABLE;
    tabBody.innerHTML = `
      <div class="card poison-damage-page">
        <div style="font-weight:700;font-size:20px;margin-bottom:16px;text-align:center;">毒气伤害对照表</div>
        <table class="stats-table">
          <thead><tr><th>回合</th><th>生命消耗</th></tr></thead>
          <tbody>${poisonDamageRows(table, state.round)}</tbody>
        </table>
      </div>`;
  } else if (adminTab === "ranking") {
    tabBody.innerHTML = `
      <div class="card">
        <div style="font-weight:700;font-size:18px;margin-bottom:16px;text-align:center;">排行榜（存活优先，其次比生命值）</div>
        <div style="overflow-x:auto;">${rankingTableHtml(state.players, { showRoles: state.rolesEnabled, showLogButton: true })}</div>
      </div>`;
    wirePlayerLogButtons(tabBody, state);
  } else if (adminTab === "rules") {
    renderGameRules(tabBody, state);
  } else if (adminTab === "timer") {
    renderTimerTab(tabBody, state);
  } else if (adminTab === "settlement") {
    renderSettlementTab(tabBody, state);
  }

  if (isEditing) {
    const importBtn = panel.querySelector("#import-btn");
    if (importBtn) importBtn.addEventListener("click", () => importPlayersFromSheet(state));
    panel.querySelector("#commit-btn").addEventListener("click", () => commitEdit(state));
    panel.querySelector("#cancel-btn").addEventListener("click", () => cancelEdit());
  } else {
    panel.querySelector("#edit-btn").addEventListener("click", () => startEdit(state));
  }

  if (isPrep) {
    panel.querySelector("#start-btn").addEventListener("click", () => {
      if (!isEditing) socket.send({ type: "admin:startGame", password: adminPassword });
    });
  }
  if (isProgress) {
    panel.querySelector("#end-btn").addEventListener("click", () => {
      if (isEditing) return;
      if (confirm("确定要结束游戏并显示排行榜吗？")) {
        socket.send({ type: "admin:endGame", password: adminPassword });
      }
    });
  }
}

function renderMeepleTray(tray, state) {
  if (!tray) return;
  const unplaced = state.players.filter((p) => !p.room);
  tray.innerHTML = unplaced.length
    ? unplaced.map((p) => `<div class="meeple" data-player-id="${p.id}" style="background:${meepleColor(p.id)};">${p.id}</div>`).join("")
    : `<span class="meeple-tray-empty">所有玩家已放置到房间</span>`;
}

// Pointer Events (not native HTML5 drag-and-drop) so this works with touch on
// phones/tablets, not just mouse.
function attachMeepleDrag(el, state) {
  el.classList.add("draggable");
  el.addEventListener("pointerdown", (e) => {
    if (e.button !== 0 && e.pointerType === "mouse") return;
    e.preventDefault();
    const playerId = Number(el.dataset.playerId);

    const ghost = document.createElement("div");
    ghost.className = "meeple-drag-ghost";
    ghost.style.background = meepleColor(playerId);
    ghost.textContent = playerId;
    ghost.style.left = e.clientX + "px";
    ghost.style.top = e.clientY + "px";
    document.body.appendChild(ghost);
    el.classList.add("dragging");

    let lastHover = null;
    function findDropTarget(x, y) {
      const under = document.elementFromPoint(x, y);
      if (!under) return null;
      const room = under.closest(".room");
      if (room && !TRANSIT_ROOM_IDS.includes(room.dataset.roomId)) {
        return { kind: "room", el: room, room: room.dataset.roomId };
      }
      // Dropping on a floor label records a poison-vote indicator only —
      // it never touches this player's actual room position.
      const floorChip = under.closest(".floor-chip");
      if (floorChip) return { kind: "floor", el: floorChip, floor: floorChip.dataset.floor };
      const tray = under.closest("#meeple-tray");
      if (tray) return { kind: "tray", el: tray };
      return null;
    }
    function onMove(ev) {
      ghost.style.left = ev.clientX + "px";
      ghost.style.top = ev.clientY + "px";
      const target = findDropTarget(ev.clientX, ev.clientY);
      const hoverEl = target ? target.el : null;
      if (hoverEl !== lastHover) {
        if (lastHover) lastHover.classList.remove("drop-hover");
        if (hoverEl) hoverEl.classList.add("drop-hover");
        lastHover = hoverEl;
      }
    }
    function onUp(ev) {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      document.body.removeChild(ghost);
      el.classList.remove("dragging");
      if (lastHover) lastHover.classList.remove("drop-hover");

      const target = findDropTarget(ev.clientX, ev.clientY);
      if (target && target.kind === "room") {
        socket.send({ type: "admin:setPlayerRoom", playerId, room: target.room, password: adminPassword });
      } else if (target && target.kind === "floor") {
        socket.send({ type: "admin:setFloorVote", playerId, floor: target.floor, password: adminPassword });
      } else if (target && target.kind === "tray") {
        socket.send({ type: "admin:setPlayerRoom", playerId, room: null, password: adminPassword });
      }
    }
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  });
}

// Small colored dots on each floor-column label showing which players'
// tokens were dragged there this round — purely a voting indicator.
function renderFloorVoteBadges(mapEl, state) {
  mapEl.querySelectorAll(".floor-vote-badges").forEach((el) => el.remove());
  const votesByFloor = {};
  for (const [playerId, floor] of Object.entries(state.floorVotes || {})) {
    (votesByFloor[floor] = votesByFloor[floor] || []).push(Number(playerId));
  }
  for (const [floor, playerIds] of Object.entries(votesByFloor)) {
    const chip = mapEl.querySelector(`.floor-chip[data-floor="${floor}"]`);
    if (!chip) continue;
    const badges = document.createElement("div");
    badges.className = "floor-vote-badges";
    badges.innerHTML = playerIds.map((pid) => `<span class="floor-vote-dot" style="background:${meepleColor(pid)};">${pid}</span>`).join("");
    chip.appendChild(badges);
  }
}

// Same Pointer Events drag pattern as attachMeepleDrag, but for the single
// Rocket Launcher icon — only rooms are valid drop targets (no tray/floor).
function attachRocketDrag(el) {
  if (!el) return;
  el.classList.add("draggable");
  el.addEventListener("pointerdown", (e) => {
    if (e.button !== 0 && e.pointerType === "mouse") return;
    e.preventDefault();

    const ghost = document.createElement("div");
    ghost.className = "rocket-drag-ghost";
    ghost.textContent = "🚀";
    ghost.style.left = e.clientX + "px";
    ghost.style.top = e.clientY + "px";
    document.body.appendChild(ghost);
    el.classList.add("dragging");

    let lastHover = null;
    function findRoomTarget(x, y) {
      const under = document.elementFromPoint(x, y);
      if (!under) return null;
      const room = under.closest(".room");
      if (room && !TRANSIT_ROOM_IDS.includes(room.dataset.roomId)) return room;
      return null;
    }
    function onMove(ev) {
      ghost.style.left = ev.clientX + "px";
      ghost.style.top = ev.clientY + "px";
      const hoverEl = findRoomTarget(ev.clientX, ev.clientY);
      if (hoverEl !== lastHover) {
        if (lastHover) lastHover.classList.remove("drop-hover");
        if (hoverEl) hoverEl.classList.add("drop-hover");
        lastHover = hoverEl;
      }
    }
    function onUp(ev) {
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
      document.body.removeChild(ghost);
      el.classList.remove("dragging");
      if (lastHover) lastHover.classList.remove("drop-hover");

      const room = findRoomTarget(ev.clientX, ev.clientY);
      if (room) {
        socket.send({ type: "admin:setRocketTarget", room: room.dataset.roomId, password: adminPassword });
      }
    }
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  });
}

function fieldStepperHtml(pid, field, value) {
  return `
    <div class="stepper-inline">
      <button class="stepper-btn sm" data-pid="${pid}" data-field="${field}" data-delta="-1">－</button>
      <input type="number" class="edit-input" data-pid="${pid}" data-field="${field}" value="${value}">
      <button class="stepper-btn sm" data-pid="${pid}" data-field="${field}" data-delta="1">＋</button>
    </div>`;
}

function statsReadyTagHtml(stats) {
  const ready = isStatsReady(stats);
  return `<span class="pill-tag ${ready ? "green" : "amber"}">${ready ? "已准备" : "待分配"}</span>`;
}

// A shared room means combat/乱斗 triggers there. Each conflicted room gets
// its own stable color so admin can visually match up who's colliding where.
function roomLabelHtml(room, roomCounts, conflictColors) {
  if (!room) return "—";
  const label = ROOM_LABELS[room] || room;
  const shared = roomCounts && roomCounts[room] > 1;
  if (!shared) return label;
  // Emoji glyphs ignore CSS color in most browsers, so a colored dot is used
  // instead of a ⚠ — that's the only reliable way to distinguish which
  // conflicted room is which at a glance.
  const color = (conflictColors && conflictColors[room]) || "#ff8a80";
  return `<span style="color:${color};font-weight:700;" title="该房间有多名玩家，将触发战斗/乱斗"><span class="room-conflict-dot" style="background:${color};"></span>${label}</span>`;
}

function healthCellHtml(pid, health, editable) {
  return `
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      ${editable ? fieldStepperHtml(pid, "health", health) : `<span>${health}</span>`}
      ${miniHealthBarHtml(health)}
    </div>`;
}

// Pill button (thumbnail + name) that opens the role-assign modal below —
// nicer than a plain <select>, and lets the picker show each role's image.
function roleAssignButtonHtml(p) {
  const role = getRole(p.roleId);
  return `
    <button class="role-assign-btn" data-pid="${p.id}">
      ${role ? `<img src="${role.image}" alt="${role.name}"><span>${role.name}</span>` : `<span class="role-assign-placeholder">未分配</span>`}
    </button>`;
}

// Immediate-effect assignment (like room drag-drop, not part of the batched
// edit/commit flow) — only the roles in this game's pool are offered, and
// whichever one is already taken by another player is shown disabled.
function openRoleAssignModal(p, state) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-card role-assign-modal">
      <div class="modal-title">为玩家 ${p.id} 选择职业</div>
      <div class="role-select-grid">
        <div class="role-select-chip ${!p.roleId ? "selected" : ""}" data-role-id="">
          <div class="role-select-chip-empty">✕</div>
          <span>未分配</span>
        </div>
        ${state.selectedRoles.map((rid) => {
          const role = getRole(rid);
          const takenBy = state.players.find((pp) => pp.roleId === rid && pp.id !== p.id);
          return `
            <div class="role-select-chip ${p.roleId === rid ? "selected" : ""} ${takenBy ? "disabled" : ""}" data-role-id="${rid}">
              <img src="${role.image}" alt="${role.name}">
              <span>${role.name}${takenBy ? `（玩家${takenBy.id}）` : ""}</span>
            </div>`;
        }).join("")}
      </div>
      <div class="modal-actions">
        <button class="btn secondary role-assign-close">关闭</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  function close() { document.body.removeChild(overlay); }
  overlay.querySelector(".role-assign-close").addEventListener("click", close);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });
  overlay.querySelectorAll(".role-select-chip:not(.disabled)").forEach((chip) => {
    chip.addEventListener("click", () => {
      socket.send({ type: "admin:assignPlayerRole", playerId: p.id, roleId: chip.dataset.roleId || null, password: adminPassword });
      close();
    });
  });
}

// Human-readable label for one playerLogs entry's source/detail — mirrors
// the wording used in the settlement accordions themselves so admin can
// cross-reference a log line against what they saw while settling that round.
function playerLogSourceLabel(entry) {
  switch (entry.source) {
    case "surgery": return "手术室 · 手术成功";
    case "combat": {
      const kindLabel = { single: "单挑", multi: "乱斗", shadow: "暗影相遇" };
      return `战斗 · ${kindLabel[entry.detail.kind] || entry.detail.kind || ""}`;
    }
    case "poison": return `毒气 · ${entry.detail.floor ? entry.detail.floor + " 楼" : "-"}`;
    case "hunger": {
      const missing = [];
      if (entry.detail.missingWater) missing.push("缺水");
      if (entry.detail.missingFood) missing.push("缺粮");
      return `水粮上交 · ${missing.join("、") || "-"}`;
    }
    case "rocket": return "火箭筒袭击";
    case "items": {
      const parts = [];
      if (entry.detail.pill) parts.push("药片");
      if (entry.detail.wine) parts.push(`酒（骰子${entry.detail.wineResult != null ? entry.detail.wineResult : "?"}）`);
      if (entry.detail.adrenaline) parts.push("肾上腺素");
      return `道具卡 · ${parts.join("、") || "-"}`;
    }
    case "revival": return `暗影复活 · 吸收 ${entry.detail.absorbed}${entry.detail.revived ? "（已复活）" : "（尚未复活）"}`;
    case "manual": return "管理员手动调整";
    default: return entry.source;
  }
}

function playerLogStatText(statDeltas) {
  if (!statDeltas) return "-";
  const parts = [];
  if (statDeltas.power) parts.push(`武力${statDeltas.power > 0 ? "+" : ""}${statDeltas.power}`);
  if (statDeltas.speed) parts.push(`速度${statDeltas.speed > 0 ? "+" : ""}${statDeltas.speed}`);
  if (statDeltas.weight) parts.push(`负重${statDeltas.weight > 0 ? "+" : ""}${statDeltas.weight}`);
  return parts.join("，") || "-";
}

// Read-only audit trail for one player: every REAL (committed) health/stat
// change, grouped by round in chronological order. Uncommitted or undone
// settlement work never reaches state.playerLogs (see buildSettlementLogEntries
// in server.js), so what's shown here is exactly what actually happened —
// this is the tool for admin to double-check a round's math after the fact.
function openPlayerLogModal(playerId, state) {
  const logs = (state.playerLogs && state.playerLogs[playerId]) || [];
  const byRound = {};
  for (const entry of logs) {
    (byRound[entry.round] = byRound[entry.round] || []).push(entry);
  }
  const rounds = Object.keys(byRound).map(Number).sort((a, b) => a - b);

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-card room-info player-log-modal">
      <div class="modal-title">玩家 ${playerId} · 状态变化日志</div>
      ${rounds.length ? rounds.map((r) => `
        <div class="player-log-round">
          <div class="player-log-round-title">第 ${r} 回合</div>
          <div style="overflow-x:auto;"><table class="stats-table">
            <thead><tr><th>来源</th><th>位置</th><th>生命变化</th><th>属性变化</th></tr></thead>
            <tbody>${byRound[r].map((entry) => `
              <tr>
                <td>${playerLogSourceLabel(entry)}</td>
                <td>${entry.room ? getRoomLabel(entry.room) : "-"}</td>
                <td>${entry.healthDelta ? `${entry.healthBefore} → ${entry.healthAfter}（${entry.healthDelta > 0 ? "+" : ""}${entry.healthDelta}）` : "-"}</td>
                <td>${playerLogStatText(entry.statDeltas)}</td>
              </tr>`).join("")}</tbody>
          </table></div>
        </div>`).join("") : `<div style="color:#8b9482;text-align:center;padding:20px 0;">暂无记录</div>`}
      <div class="modal-actions">
        <button class="btn secondary player-log-close">关闭</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  function close() { document.body.removeChild(overlay); }
  overlay.querySelector(".player-log-close").addEventListener("click", close);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) close(); });
}

function wirePlayerLogButtons(container, state) {
  container.querySelectorAll(".log-btn[data-log-pid]").forEach((btn) => {
    btn.addEventListener("click", () => openPlayerLogModal(Number(btn.dataset.logPid), state));
  });
}

function renderPlayersTable(tbody, state) {
  const roomCounts = {};
  for (const pl of state.players) {
    if (pl.room) roomCounts[pl.room] = (roomCounts[pl.room] || 0) + 1;
  }
  const conflictColors = assignRoomConflictColors(roomCounts);

  tbody.innerHTML = state.players.map((p) => {
    if (isEditing) {
      const d = draft.players[p.id];
      const dead = d.health <= 0;
      return `<tr>
        <td>玩家 ${p.id}</td>
        <td>${healthCellHtml(p.id, d.health, true)}</td>
        <td><button class="btn ${dead ? "" : "secondary"}" data-toggle-dead="${p.id}" style="padding:5px 10px;font-size:12px;">${dead ? "复活" : "标记死亡"}</button></td>
        <td>${statsReadyTagHtml(d.stats)}</td>
        <td>${roomLabelHtml(p.room, roomCounts, conflictColors)}</td>
        <td>${fieldStepperHtml(p.id, "power", d.stats.power)}</td>
        <td>${fieldStepperHtml(p.id, "speed", d.stats.speed)}</td>
        <td>${fieldStepperHtml(p.id, "weight", d.stats.weight)}</td>
        ${state.rolesEnabled ? `<td>${roleAssignButtonHtml(p)}</td>` : ""}
      </tr>`;
    }
    const dead = p.health <= 0;
    const sumClass = (p.stats.power + p.stats.speed + p.stats.weight) >= STAT_POINTS_TOTAL ? "sum-full" : "";
    return `<tr>
      <td>玩家 ${p.id}</td>
      <td>${healthCellHtml(p.id, p.health, false)}</td>
      <td><span class="pill-tag ${dead ? "purple" : "green"}">${dead ? "暗影" : "存活"}</span></td>
      <td>${statsReadyTagHtml(p.stats)}</td>
      <td>${roomLabelHtml(p.room, roomCounts, conflictColors)}</td>
      <td class="${sumClass}">${p.stats.power}</td>
      <td>${p.stats.speed}</td>
      <td>${p.stats.weight}</td>
      ${state.rolesEnabled ? `<td>${roleAssignButtonHtml(p)}</td>` : ""}
    </tr>`;
  }).join("");

  if (state.rolesEnabled) {
    tbody.querySelectorAll(".role-assign-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const player = state.players.find((pp) => pp.id === Number(btn.dataset.pid));
        if (player) openRoleAssignModal(player, state);
      });
    });
  }

  if (isEditing) {
    tbody.querySelectorAll(".edit-input").forEach((input) => {
      input.addEventListener("change", () => {
        const pid = Number(input.dataset.pid);
        const field = input.dataset.field;
        const v = Math.round(Number(input.value) || 0);
        if (field === "health") draft.players[pid].health = v;
        else draft.players[pid].stats[field] = Math.max(0, v);
        render();
      });
    });
    tbody.querySelectorAll("[data-delta]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const pid = Number(btn.dataset.pid);
        const field = btn.dataset.field;
        const delta = Number(btn.dataset.delta);
        const d = draft.players[pid];
        if (field === "health") {
          d.health += delta;
        } else {
          d.stats[field] = Math.max(0, d.stats[field] + delta);
        }
        render();
      });
    });
    tbody.querySelectorAll("[data-toggle-dead]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const pid = Number(btn.dataset.toggleDead);
        const d = draft.players[pid];
        d.health = d.health <= 0 ? 10 : -2;
        render();
      });
    });
  }
}

function renderEndedAdmin(state) {
  panel.innerHTML = `
    <div class="panel-header">
      <span class="panel-title">禁闭逃杀 · 管理员</span>
      <span class="round-badge">第 <span class="round-number">${state.round}</span> 回合</span>
    </div>
    <div class="panel-body" style="display:flex;flex-direction:column;gap:24px;">
      <div class="card">
        <div style="font-weight:700;font-size:18px;margin-bottom:16px;text-align:center;">游戏结束 · 排行榜</div>
        <div style="overflow-x:auto;">${rankingTableHtml(state.players, { showRoles: state.rolesEnabled, showLogButton: true })}</div>
      </div>
      <div style="display:flex;justify-content:flex-end;">
        <button class="btn" id="restart-btn">重新开始游戏</button>
      </div>
    </div>
  `;
  wirePlayerLogButtons(panel, state);
  panel.querySelector("#restart-btn").addEventListener("click", () => {
    if (confirm("确定要重新开始游戏吗？所有数据将被清除。")) {
      socket.send({ type: "admin:restartGame", password: adminPassword });
    }
  });
}

boot();
</script>
</body>
