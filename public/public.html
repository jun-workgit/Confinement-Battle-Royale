<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>禁闭逃杀 — 公共视图</title>
<link rel="icon" type="image/png" href="/assets/player-dead.png">
<link rel="stylesheet" href="/shared.css">
</head>
<body>
<div class="page">
  <div class="panel" id="panel">
    <div class="center-msg"><span class="big">加载中...</span></div>
  </div>
</div>

<script src="/map-data.js"></script>
<script src="/roles-data.js"></script>
<script src="/ws-client.js"></script>
<script>
const panel = document.getElementById("panel");
const PHASE_TEXT = { setup: "等待创建游戏", prep: "准备阶段", in_progress: "游戏进行中", ended: "游戏结束" };
let activeTab = "map";
let latestState = null;

// Map zoom for the public display — persisted so a screen left running
// (e.g. on a TV/projector) keeps whatever size was last dialed in.
const MAP_BASE_WIDTH = 820; // matches .public-map-view .map-img in shared.css
const MAP_ZOOM_MIN = 0.5, MAP_ZOOM_MAX = 1.6, MAP_ZOOM_STEP = 0.1;
let mapZoom = Number(localStorage.getItem("jbts_public_map_zoom")) || 1;

function setMapZoom(z) {
  mapZoom = Math.max(MAP_ZOOM_MIN, Math.min(MAP_ZOOM_MAX, Math.round(z * 10) / 10));
  localStorage.setItem("jbts_public_map_zoom", mapZoom);
}

// --- Sound: public view only. Looping BGM plus a one-shot cue whenever the
// poisoned-floor set changes. Browsers block unmuted autoplay until a user
// gesture, so both tracks start muted-but-playing (muted autoplay is always
// allowed) and the mute toggle's own click is what unlocks real sound —
// after that, later one-shot plays are allowed too. Preference persists so
// a screen left running keeps whatever the last visitor chose.
const bgmAudio = new Audio("/assets/BGM.mp3");
bgmAudio.loop = true;
const poisonAudio = new Audio("/assets/Poison%20Gas.mp3");
let soundMuted = localStorage.getItem("jbts_public_muted") !== "0"; // muted by default until unmuted once
let lastPoisonFloorsKey; // undefined until the first state arrives — avoids firing on initial load

function applySoundMuted() {
  bgmAudio.muted = soundMuted;
  poisonAudio.muted = soundMuted;
  localStorage.setItem("jbts_public_muted", soundMuted ? "1" : "0");
}
applySoundMuted();
bgmAudio.play().catch(() => {});

function toggleSoundMuted() {
  soundMuted = !soundMuted;
  applySoundMuted();
  if (!soundMuted) bgmAudio.play().catch(() => {});
  renderSoundToggle();
}

function renderSoundToggle() {
  const btn = document.getElementById("sound-toggle-btn");
  if (btn) btn.textContent = soundMuted ? "🔇 静音" : "🔊 音效";
}

// Created once, outside the tab-driven panel re-renders, so it (and the
// audio elements above) persist across every tab switch.
const soundToggleBox = document.createElement("div");
soundToggleBox.className = "sound-toggle-box";
soundToggleBox.innerHTML = `<button class="btn secondary" id="sound-toggle-btn"></button>`;
document.body.appendChild(soundToggleBox);
renderSoundToggle();
soundToggleBox.querySelector("#sound-toggle-btn").addEventListener("click", toggleSoundMuted);

connectGameSocket((state) => {
  const poisonKey = JSON.stringify(state.poisonFloors || []);
  if (lastPoisonFloorsKey !== undefined && poisonKey !== lastPoisonFloorsKey) {
    poisonAudio.currentTime = 0;
    poisonAudio.play().catch(() => {});
  }
  lastPoisonFloorsKey = poisonKey;
  latestState = state;
  render();
});
startTimerTicker(() => latestState && latestState.timer);

function render() {
  const state = latestState;
  if (!state) return;

  if (state.phase === "ended") {
    panel.innerHTML = `
      <div class="panel-header">
        <span class="panel-title">禁闭逃杀</span>
        <span class="round-badge">第 <span class="round-number">${state.round}</span> 回合</span>
      </div>
      <div class="panel-body">
        <div class="card">
          <div style="font-weight:700;font-size:20px;margin-bottom:16px;text-align:center;">游戏结束 · 排行榜</div>
          <div style="overflow-x:auto;">${rankingTableHtml(state.players, { showRoles: state.rolesEnabled })}</div>
        </div>
      </div>`;
    return;
  }

  panel.innerHTML = `
    <div class="panel-header">
      <span class="panel-title">禁闭逃杀</span>
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
        <span class="round-badge">第 <span class="round-number">${state.round}</span> 回合</span>
        ${state.timer && state.timer.durationSec > 0
          ? `<span class="timer-badge" id="header-timer-badge" title="点击查看全屏倒计时">⏱ <span data-timer-clock>${formatTimerClock(timerRemainingSec(state.timer))}</span></span>`
          : ""}
        <div class="tabs">
          <div class="tab ${activeTab === "map" ? "active" : ""}" id="tab-map">地图</div>
          <div class="tab ${activeTab === "ranking" ? "active" : ""}" id="tab-ranking">排行榜</div>
          <div class="tab ${activeTab === "rules" ? "active" : ""}" id="tab-rules">游戏规则</div>
          <div class="tab ${activeTab === "video" ? "active" : ""}" id="tab-video">视频</div>
          <div class="tab ${activeTab === "timer" ? "active" : ""}" id="tab-timer">计时器</div>
        </div>
        <span style="font-size:13px;color:#c9ccd1;">
          <span class="status-dot ${state.phase === "setup" ? "off" : "on"}"></span>${PHASE_TEXT[state.phase] || ""}${state.playerCount ? " · " + state.playerCount + " 名玩家" : ""}
        </span>
      </div>
    </div>
    <div class="panel-body" id="body"></div>
  `;
  panel.querySelector("#tab-map").addEventListener("click", () => { activeTab = "map"; render(); });
  panel.querySelector("#tab-ranking").addEventListener("click", () => { activeTab = "ranking"; render(); });
  panel.querySelector("#tab-rules").addEventListener("click", () => { activeTab = "rules"; render(); });
  panel.querySelector("#tab-video").addEventListener("click", () => { activeTab = "video"; render(); });
  panel.querySelector("#tab-timer").addEventListener("click", () => { activeTab = "timer"; render(); });
  const headerBadge = panel.querySelector("#header-timer-badge");
  if (headerBadge) {
    headerBadge.style.cursor = "pointer";
    headerBadge.addEventListener("click", () => { activeTab = "timer"; render(); });
  }

  const body = panel.querySelector("#body");
  if (activeTab === "ranking") {
    body.innerHTML = `
      <div class="card">
        <div style="font-weight:700;font-size:18px;margin-bottom:16px;text-align:center;">玩家状态（仅生命值公开）</div>
        <div style="overflow-x:auto;">${rankingTableHtml(state.players, { showRoles: state.rolesEnabled, restricted: true })}</div>
      </div>`;
  } else if (activeTab === "rules") {
    renderGameRules(body, state);
  } else if (activeTab === "timer") {
    body.innerHTML = `
      <div class="timer-fullpage">
        <div class="timer-fullpage-title">倒计时</div>
        <div class="timer-display timer-display-huge" data-timer-clock>${formatTimerClock(timerRemainingSec(state.timer))}</div>
      </div>`;
  } else if (activeTab === "video") {
    body.innerHTML = `
      <div class="video-wrap">
        <iframe src="https://www.youtube.com/embed/K21WLdWRL9s" title="禁闭逃杀 - 游戏规则"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>`;
  } else {
    // Poison damage reference only ever shows alongside the map, not on the other tabs.
    body.innerHTML = `
      <div class="map-zoom-controls">
        <button class="btn secondary" id="zoom-out" ${mapZoom <= MAP_ZOOM_MIN ? "disabled" : ""}>－</button>
        <span class="map-zoom-label">${Math.round(mapZoom * 100)}%</span>
        <button class="btn secondary" id="zoom-in" ${mapZoom >= MAP_ZOOM_MAX ? "disabled" : ""}>＋</button>
      </div>
      <div class="public-map-view"></div>`;
    const mapWrap = body.querySelector(".public-map-view");
    renderMap(mapWrap, state.poisonFloors);
    mapWrap.querySelector(".map-img").style.width = Math.round(MAP_BASE_WIDTH * mapZoom) + "px";
    mapWrap.querySelectorAll(".room").forEach((el) => {
      el.style.cursor = "pointer";
      el.addEventListener("click", () => showRoomInfo(el.dataset.roomId, undefined, state.round));
    });
    renderPoisonInfoBox(body, state);
    renderAirdropBox(body, state);
    body.querySelector("#zoom-out").addEventListener("click", () => { setMapZoom(mapZoom - MAP_ZOOM_STEP); render(); });
    body.querySelector("#zoom-in").addEventListener("click", () => { setMapZoom(mapZoom + MAP_ZOOM_STEP); render(); });
  }
}

function renderPoisonInfoBox(container, state) {
  const table = state.poisonDamageTable && state.poisonDamageTable.length ? state.poisonDamageTable : DEFAULT_POISON_DAMAGE_TABLE;
  const box = document.createElement("div");
  box.className = "poison-info-box";
  box.innerHTML = `
    <div class="poison-info-title">毒气伤害</div>
    <table>${poisonDamageRows(table, state.round)}</table>
  `;
  container.appendChild(box);
}

// The game never runs past round 6, so there's no card outside 1-6 (covers
// phase "prep", where round is still 0).
function renderAirdropBox(container, state) {
  const card = getAirdropCard(state.round);
  if (!card) return;
  const box = document.createElement("div");
  box.className = "airdrop-box";
  box.innerHTML = `
    <div class="airdrop-title">${card.title}</div>
    <img class="airdrop-img" src="${card.image}" alt="${card.title}">
    <div class="airdrop-desc">${card.description}</div>
  `;
  container.appendChild(box);
}
</script>
</body>
</html>
